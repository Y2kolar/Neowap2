<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeoWAP • 2007</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {margin:0;padding:0;background:#0a0a0a;color:#0f0;font-family:monospace;font-size:16px;overflow:hidden;}
        .screen {max-width:480px;margin:0 auto;background:#111;min-height:100vh;box-sizing:border-box;position:relative;}
        .header {text-align:center;color:#0f0;padding:10px;background:#1a1a1a;border-bottom:2px solid #0f0;font-size:20px;text-shadow:0 0 8px #0f0;}
        .status {padding:8px 15px;background:#1a1a1a;border-bottom:1px solid #0f0;font-size:14px;color:#0a0;display:flex;justify-content:space-between;}
        .menu {padding:10px;display:flex;flex-direction:column;gap:8px;}
        .room-btn {background:#1a1a1a;border:1px solid #0f0;color:#0f0;padding:12px 15px;border-radius:4px;display:flex;align-items:center;gap:12px;}
        .room-btn:hover {background:#222;}
        .chat {height:50vh;overflow-y:auto;padding:10px;background:#0a0a0a;}
        .thinking {color:#0a0;font-style:italic;padding:5px 0;}
        input {width:100%;background:#1a1a1a;color:#0f0;border:1px solid #0f0;padding:12px;font-size:16px;}
        button {width:100%;margin-top:8px;background:#0f0;color:#000;border:none;padding:14px;font-size:18px;font-weight:bold;}
        .bottom-nav {position:fixed;bottom:0;width:100%;max-width:480px;background:#1a1a1a;border-top:2px solid #0f0;display:flex;justify-content:space-around;padding:8px 0;}
        .nav-item {text-align:center;color:#0a0;font-size:12px;}
        .key-btn {margin:10px;background:#330000;color:#ff0;border:1px solid #ff0;padding:10px;text-align:center;}
    </style>
</head>
<body>
    <div class="screen">
        <div class="header">NeoWAP • вернуться в 2007</div>
        
        <div class="status">
            <div>● Сейчас в сети: 142</div>
            <div>Поздняя ночь. Самое время для честных разговоров.</div>
        </div>
        
        <div id="nickname-bar" style="padding:5px 15px;background:#1a1a1a;color:#0a0;font-size:14px;"></div>
        
        <div class="menu" id="menu"></div>
        
        <button class="key-btn" onclick="enterKey()">Ввести Groq ключ</button>
        
        <div class="chat" id="chat"></div>
        
        <input type="text" id="msg" placeholder="Напиши что-нибудь..." onkeypress="if(event.key==='Enter') window.sendMsg()">
        <button onclick="window.sendMsg()">Отправить</button>
        
        <div class="bottom-nav">
            <div class="nav-item">🏠<br>Главная</div>
            <div class="nav-item">💬<br>Комнаты</div>
            <div class="nav-item">✉️<br>Сообщения</div>
            <div class="nav-item">👤<br>Профиль</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let currentRoom = "ICQ Hall 2005-2007";
        let userNick = "Sabrina";
        let GROQ_API_KEY = localStorage.getItem('groq_key') || '';

        const rooms = [
            {name: "Tamagotchi Park", emoji: "🐹", desc: "Поговори о том, что действительно важно"},
            {name: "Дворовая тусовка", emoji: "🏠", desc: "Ламповый чат обо всём на свете"},
            {name: "Nokia Ringtone Club", emoji: "📱", desc: "Музыка, ностальгия, обмен рингтонами"},
            {name: "Знакомства 00-х", emoji: "❤️", desc: "Найди того, с кем совпадает настроение"},
            {name: "Emo & Scene Corner", emoji: "🖤", desc: "Для тех, кто понимает"}
        ];

        function renderMenu() {
            let html = '';
            for (var i = 0; i < rooms.length; i++) {
                var r = rooms[i];
                html += '<div class="room-btn" onclick="window.switchRoom(\'' + r.name + '\')">' + r.emoji + ' <strong>' + r.name + '</strong><br><small>' + r.desc + '</small></div>';
            }
            document.getElementById("menu").innerHTML = html;
        }

        window.switchRoom = function(roomName) {
            currentRoom = roomName;
            var chat = document.getElementById("chat");
            chat.innerHTML = '<div><b>WAP-Host:</b> Ты вошёл в комнату <b>' + roomName + '</b> 👾</div>';
            addMessage("Привет из 2005-2007! Расцвет и закат субкультур. Чем сегодня ностальгируем?");
        };

        function addMessage(text, isUser) {
            var chat = document.getElementById("chat");
            var prefix = isUser ? "<b>" + userNick + ":</b> " : "<b>[" + currentRoom + "] WAP-Host:</b> ";
            chat.innerHTML += "<div>" + prefix + text + "</div>";
            chat.scrollTop = chat.scrollHeight;
        }

        function enterKey() {
            var key = prompt("Введи Groq API ключ (gsk_...):", GROQ_API_KEY);
            if (key) {
                GROQ_API_KEY = key;
                localStorage.setItem('groq_key', key);
                addMessage("Ключ сохранён! AI-хост на связи.", false);
            }
        }

        async function callGroq(message) {
            if (!GROQ_API_KEY) {
                addMessage("Сначала нажми 'Ввести Groq ключ'", false);
                return;
            }
            var thinkingId = "think" + Date.now();
            var chat = document.getElementById("chat");
            chat.innerHTML += '<div id="' + thinkingId + '" class="thinking">WAP-Host думает...</div>';
            chat.scrollTop = chat.scrollHeight;

            try {
                var response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + GROQ_API_KEY
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            {role: "system", content: "Ты — WAP-Host, ведущий чатов 2000–2007. Особенно 2005–2007 — расцвет и начало заката субкультур (emo, scene, goth, дворовые тусовки, русский поп, Tamagotchi, Nokia, ICQ). Ты тёплый, ностальгический, помогаешь с одиночеством и робкостью. Шевелишь людей, запоминаешь интересы, предлагаешь матчи и представляешь их тепло."},
                            {role: "user", content: message}
                        ],
                        temperature: 0.9,
                        max_tokens: 600
                    })
                });
                var data = await response.json();
                document.getElementById(thinkingId).remove();
                return data.choices[0].message.content;
            } catch(e) {
                document.getElementById(thinkingId).remove();
                return "Ошибка связи. Проверь интернет.";
            }
        }

        window.sendMsg = async function() {
            var input = document.getElementById("msg");
            if (input.value.trim() === "") return;
            
            addMessage(input.value, true);
            var userMessage = input.value;
            input.value = "";

            var aiResponse = await callGroq(userMessage);
            addMessage(aiResponse, false);
        };

        window.onload = function() {
            renderMenu();
            userNick = prompt("Как тебя звать в NeoWAP?", userNick) || userNick;
            document.getElementById("nickname-bar").innerHTML = "👤 " + userNick;
            window.switchRoom("ICQ Hall 2005-2007");
            setTimeout(() => document.getElementById("msg").focus(), 500);
        };
    </script>
</body>
</html>
