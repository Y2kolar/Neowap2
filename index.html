
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeoWAP v2.2</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {margin:0;padding:0;background:#000;color:#0f0;font-family:monospace;font-size:18px;overflow:hidden;}
        .screen {max-width:480px;margin:0 auto;border:8px solid #222;background:#001100;padding:10px;min-height:100vh;box-sizing:border-box;}
        .header {text-align:center;color:#0f0;margin-bottom:10px;font-size:22px;text-shadow:0 0 8px #0f0;}
        .menu {display:flex;flex-wrap:wrap;gap:8px;margin-bottom:15px;}
        .room-btn {background:#003300;color:#0f0;border:2px solid #0f0;padding:12px 15px;font-size:16px;flex:1 1 45%;text-align:center;border-radius:4px;}
        .chat {height:48vh;overflow-y:auto;border:2px solid #0f0;padding:10px;background:#000;line-height:1.5;margin-bottom:10px;}
        .thinking {color:#0a0;font-style:italic;}
        input {width:100%;background:#000;color:#0f0;border:2px solid #0f0;padding:12px;font-size:16px;}
        button {width:100%;margin-top:8px;background:#0f0;color:#000;border:none;padding:14px;font-size:18px;font-weight:bold;}
        .key-btn {background:#330000;color:#ff0;border:2px solid #ff0;}
    </style>
</head>
<body>
    <div class="screen">
        <div class="header">=== NEO WAP v2005 ===<br>Мобильный чат 2.0</div>
        
        <div id="nickname-bar" style="text-align:center;margin-bottom:10px;font-size:16px;color:#0a0;"></div>
        
        <div class="menu" id="menu"></div>
        
        <button class="key-btn" onclick="enterKey()">Ввести Groq ключ</button>
        
        <div class="chat" id="chat"></div>
        
        <input type="text" id="msg" placeholder="Пиши сюда..." onkeypress="if(event.key==='Enter') window.sendMsg()">
        <button onclick="window.sendMsg()">Отправить</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let currentRoom = "ICQ Hall 2005";
        let userNick = "Sabrina";
        let GROQ_API_KEY = localStorage.getItem('groq_key') || '';

        const rooms = [
            {name: "ICQ Hall 2005", emoji: "💬"},
            {name: "Tamagotchi Park", emoji: "🐹"},
            {name: "Дворовая тусовка", emoji: "🏠"},
            {name: "Nokia Ringtone Club", emoji: "📱"},
            {name: "Знакомства 00-х", emoji: "❤️"}
        ];

        function renderMenu() {
            let html = '';
            for (var i = 0; i < rooms.length; i++) {
                var r = rooms[i];
                html += '<div class="room-btn" onclick="window.switchRoom(\'' + r.name + '\')">' + r.emoji + ' ' + r.name + '</div>';
            }
            document.getElementById("menu").innerHTML = html;
        }

        window.switchRoom = function(roomName) {
            currentRoom = roomName;
            var chat = document.getElementById("chat");
            chat.innerHTML = '<div><b>WAP-Host:</b> Ты вошёл в комнату <b>' + roomName + '</b> 👾</div>';
            addMessage("Привет из 2005-го! Чем сегодня займёмся?");
        };

        function addMessage(text, isUser) {
            var chat = document.getElementById("chat");
            var prefix = isUser ? "<b>" + userNick + ":</b> " : "<b>[" + currentRoom + "] WAP-Host:</b> ";
            chat.innerHTML += "<div>" + prefix + text + "</div>";
            chat.scrollTop = chat.scrollHeight;
        }

        function enterKey() {
            var key = prompt("Введи Groq API ключ (gsk_...):", GROQ_API_KEY);
            if (key) {
                GROQ_API_KEY = key;
                localStorage.setItem('groq_key', key);
                addMessage("Ключ сохранён! Теперь можно писать сообщения.", false);
            }
        }

        async function callGroq(message) {
            if (!GROQ_API_KEY) {
                addMessage("Сначала нажми кнопку 'Ввести Groq ключ'", false);
                return;
            }
            var thinkingId = "think" + Date.now();
            var chat = document.getElementById("chat");
            chat.innerHTML += '<div id="' + thinkingId + '" class="thinking">WAP-Host думает...</div>';
            chat.scrollTop = chat.scrollHeight;

            try {
                var response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + GROQ_API_KEY
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            {role: "system", content: "Ты — WAP-Host, дружелюбный ведущий ретро-чатов 2005 года. Говори тепло, с ностальгией, используй сленг 00-х. Помогай людям преодолевать робость, одиночество и нерешительность. Текущая комната: " + currentRoom},
                            {role: "user", content: message}
                        ],
                        temperature: 0.85,
                        max_tokens: 500
                    })
                });
                var data = await response.json();
                document.getElementById(thinkingId).remove();
                return data.choices[0].message.content;
            } catch(e) {
                document.getElementById(thinkingId).remove();
                return "Ошибка. Проверь ключ или интернет.";
            }
        }

        window.sendMsg = async function() {
            var input = document.getElementById("msg");
            if (input.value.trim() === "") return;
            
            addMessage(input.value, true);
            var userMessage = input.value;
            input.value = "";

            var aiResponse = await callGroq(userMessage);
            addMessage(aiResponse, false);
        };

        window.onload = function() {
            renderMenu();
            
            userNick = prompt("Как тебя звать в NeoWAP?", userNick) || userNick;
            document.getElementById("nickname-bar").innerHTML = "👤 Ты — <b>" + userNick + "</b>";
            
            window.switchRoom("ICQ Hall 2005");
            
            setTimeout(function() {
                document.getElementById("msg").focus();
            }, 500);
        };
    </script>
</body>
</html>
