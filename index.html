<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeoWAP v1.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0; padding: 0; background: #000; color: #0f0; 
            font-family: monospace; font-size: 18px; 
            image-rendering: pixelated; overflow: hidden;
        }
        .screen {
            max-width: 480px; margin: 0 auto; 
            border: 8px solid #222; background: #001100; 
            padding: 15px; min-height: 100vh; box-sizing: border-box;
        }
        .header { 
            text-align: center; color: #0f0; margin-bottom: 20px; 
            font-size: 20px; text-shadow: 0 0 5px #0f0;
        }
        .chat { 
            line-height: 1.5; height: 65vh; overflow-y: auto; 
            border: 2px solid #0f0; padding: 10px; background: #000;
        }
        input { 
            width: 100%; background: #000; color: #0f0; 
            border: 2px solid #0f0; padding: 12px; font-family: monospace; font-size: 16px;
        }
        button {
            width: 100%; margin-top: 8px; background: #0f0; color: #000;
            border: none; padding: 12px; font-family: monospace; font-size: 18px; font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="screen">
        <div class="header">=== NEO WAP v2005 ===<br>Мобильный чат 2.0</div>
        
        <div class="chat" id="chat"></div>
        
        <input type="text" id="msg" placeholder="Напиши сюда... (как в старом WAP)" onkeypress="if(event.key==='Enter') sendMsg()">
        <button onclick="sendMsg()">Отправить</button>
    </div>

    <script>
        // Инициализация Telegram Mini App
        const tg = window.Telegram.WebApp;
        tg.expand();           // Полноэкранный режим
        tg.ready();            // Говорим Telegram, что всё готово
        tg.MainButton.hide();  // Скрываем ненужную кнопку

        function addMessage(text, isUser = false) {
            const chat = document.getElementById('chat');
            const prefix = isUser ? '<b>Ты:</b> ' : '<b>WAP-Host:</b> ';
            chat.innerHTML += `<div>\( {prefix} \){text}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }

        function sendMsg() {
            const input = document.getElementById('msg');
            if (input.value.trim() === '') return;
            
            addMessage(input.value, true);
            
            // Симуляция ответа AI-хоста (пока простой)
            setTimeout(() => {
                addMessage('Эй, братан! Помнишь, как в 2005-м в WAP-чате сидели? 🔥 Что у тебя было любимым — ICQ, Tamagotchi или Dendy?');
            }, 800);
            
            input.value = '';
        }

        // Приветствие при запуске
        window.onload = function() {
            addMessage('Добро пожаловать обратно в 2005-й! 👾');
            addMessage('Я — WAP-Host. Пиши что угодно или жди следующих комнат.');
            
            // Показываем информацию о пользователе (для теста)
            if (tg.initDataUnsafe.user) {
                console.log('Пользователь:', tg.initDataUnsafe.user);
            }
        };
    </script>
</body>
</html>
