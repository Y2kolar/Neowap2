<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeoWAP</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin:0;
    background:#0b0f0d;
    color:#b7f7c0;
    font-family: monospace;
}

.screen {
    max-width:480px;
    margin:auto;
    min-height:100vh;
    padding-bottom:80px;
}

/* HEADER */
.header {
    text-align:center;
    padding:12px;
    font-size:20px;
    color:#6eff9e;
    letter-spacing:1px;
}

/* STATUS */
.status {
    font-size:13px;
    padding:10px 15px;
    color:#7aa88a;
}

/* CARDS */
.menu {
    padding:10px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.card {
    background:#0f1512;
    border:1px solid #1f3a2d;
    border-radius:10px;
    padding:14px;
    transition:0.2s;
}

.card:hover {
    border-color:#3ddc84;
    box-shadow:0 0 10px rgba(61,220,132,0.2);
}

.card-title {
    color:#6eff9e;
    font-size:16px;
}

.card-desc {
    font-size:13px;
    color:#7aa88a;
}

/* CHAT */
.chat {
    padding:10px;
    height:40vh;
    overflow:auto;
}

.msg {
    margin-bottom:10px;
    max-width:85%;
    padding:10px;
    border-radius:10px;
    background:#0f1512;
    border:1px solid #1f3a2d;
}

.me {
    margin-left:auto;
    background:#13221a;
}

.typing {
    font-size:12px;
    color:#7aa88a;
    padding:5px;
}

/* INPUT */
.input-box {
    position:fixed;
    bottom:60px;
    width:100%;
    max-width:480px;
    background:#0b0f0d;
    padding:10px;
}

input {
    width:100%;
    padding:12px;
    background:#0f1512;
    border:1px solid #1f3a2d;
    border-radius:8px;
    color:#b7f7c0;
}

input:focus {
    outline:none;
    border-color:#3ddc84;
}

/* BUTTON */
button {
    margin-top:8px;
    width:100%;
    padding:12px;
    background:#3ddc84;
    border:none;
    border-radius:8px;
    font-weight:bold;
}

/* NAV */
.nav {
    position:fixed;
    bottom:0;
    width:100%;
    max-width:480px;
    display:flex;
    justify-content:space-around;
    background:#0f1512;
    padding:10px 0;
    border-top:1px solid #1f3a2d;
    font-size:12px;
    color:#7aa88a;
}
</style>
</head>

<body>

<div class="screen">

<div class="header">NeoWAP</div>

<div class="status">
    ● Сейчас онлайн: 137<br>
    Поздняя ночь. Обычно в это время говорят честнее.
</div>

<div class="menu" id="menu"></div>

<div class="chat" id="chat"></div>

<div id="typing" class="typing"></div>

<div class="input-box">
    <input id="msg" placeholder="Напиши что-нибудь… даже одно слово подойдёт">
    <button onclick="sendMsg()">Отправить</button>
</div>

<div class="nav">
    <div>🏠</div>
    <div>💬</div>
    <div>✉️</div>
    <div>👤</div>
</div>

</div>

<script>
const rooms = [
    {name:"Tamagotchi Park", desc:"Поговори о важном"},
    {name:"Дворовая тусовка", desc:"Ламповый чат"},
    {name:"Nokia Club", desc:"Музыка и ностальгия"},
    {name:"Знакомства 00-х", desc:"Найди своего человека"}
];

let currentRoom = "Главная";
let GROQ_API_KEY = localStorage.getItem('groq_key') || '';
let userNick = "Ты";

function renderMenu(){
    let html='';
    rooms.forEach(r=>{
        html+=`
        <div class="card" onclick="enterRoom('${r.name}')">
            <div class="card-title">${r.name}</div>
            <div class="card-desc">${r.desc}</div>
        </div>`;
    });
    document.getElementById("menu").innerHTML = html;
}

function enterRoom(name){
    currentRoom = name;
    addMsg("Ты зашёл в "+name, false);
    addMsg("Иногда проще говорить с незнакомцем. Попробуем?", false);
}

function addMsg(text, me){
    let div = document.createElement("div");
    div.className = "msg" + (me ? " me" : "");
    div.innerText = text;
    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = 9999;
}

function showTyping(){
    document.getElementById("typing").innerText = "Sabrina печатает...";
}

function hideTyping(){
    document.getElementById("typing").innerText = "";
}

async function callAI(text){
    if(!GROQ_API_KEY){
        let key = prompt("Введи Groq ключ:");
        if(key){
            GROQ_API_KEY = key;
            localStorage.setItem('groq_key', key);
        } else return "Нет ключа.";
    }

    showTyping();

    await new Promise(r=>setTimeout(r, 1200)); // пауза

    try{
        let res = await fetch("https://api.groq.com/openai/v1/chat/completions",{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer "+GROQ_API_KEY
            },
            body:JSON.stringify({
                model:"llama-3.3-70b-versatile",
                messages:[
                    {role:"system", content:"Ты Sabrina. Спокойная, живая, немного ностальгическая. Помогаешь человеку раскрыться."},
                    {role:"user", content:text}
                ]
            })
        });

        let data = await res.json();
        hideTyping();
        return data.choices[0].message.content;

    }catch(e){
        hideTyping();
        return "Связь потерялась… попробуем ещё?";
    }
}

async function sendMsg(){
    let input = document.getElementById("msg");
    let text = input.value.trim();
    if(!text) return;

    addMsg(text, true);
    input.value = "";

    let reply = await callAI(text);
    addMsg(reply, false);

    // шанс предложить приват
    if(Math.random() > 0.7){
        setTimeout(()=>{
            addMsg("Похоже, ты готов к личному диалогу. Хочешь перейти?", false);
        }, 1500);
    }
}

renderMenu();
</script>

</body>
</html>
